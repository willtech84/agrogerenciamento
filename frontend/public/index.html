<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1d6f42" />
    <meta name="description" content="Console inicial do Agro Gerenciamento" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Agro Gerenciamento</title>
    <style>
      body { font-family: "Segoe UI", sans-serif; margin: 0; background: #f4f7f5; color: #1f2a24; }
      header { background: #1d6f42; color: #fff; padding: 24px; text-align: center; }
      main { max-width: 980px; margin: 24px auto; padding: 0 16px; display: grid; gap: 16px; }
      .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,.08); }
      .status { display: inline-flex; align-items: center; padding: 8px 12px; border-radius: 999px; font-weight: 600; }
      .status.ok { background: #e2f6ea; color: #1a7f37; }
      .status.error { background: #ffe7e7; color: #c81e1e; }
      .details { margin-top: 12px; font-family: Consolas, monospace; background: #f2f4f3; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
      .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
      .grid2 { display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      label { display: grid; gap: 4px; font-size: 14px; }
      input, select, textarea { padding: 9px; border-radius: 8px; border: 1px solid #d0d8d3; }
      button { background: #1d6f42; color: #fff; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; }
      button.secondary { background: #2f4f3f; }
      button.danger { background: #b3261e; }
      button[hidden] { display: none; }
      #install { background: #164f31; }
      .item { border: 1px solid #dce5df; border-radius: 8px; padding: 12px; margin-top: 8px; }
      .muted { color: #5b6860; font-size: 13px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Agro Gerenciamento</h1>
      <p>Sprint 3: Culturas + Atividades + Relatórios simples</p>
    </header>
    <main>
      <section class="card">
        <h2>Status do backend</h2>
        <div id="status" class="status">Carregando...</div>
        <div id="details" class="details"></div>
        <div class="actions">
          <button id="refresh">Atualizar status</button>
          <button id="install" hidden>Instalar aplicativo</button>
        </div>
      </section>

      <section class="card">
        <h2>Login</h2>
        <div class="grid2">
          <label>Email <input id="login-email" type="email" placeholder="admin@agro.local" /></label>
          <label>Senha <input id="login-password" type="password" placeholder="******" /></label>
        </div>
        <div class="actions">
          <button id="btn-login">Entrar</button>
          <button id="btn-me" class="secondary">Meu perfil</button>
          <button id="btn-logout" class="danger">Sair</button>
        </div>
        <div id="auth-details" class="details"></div>
      </section>

      <section class="card">
        <h2>Cadastro rápido de usuário</h2>
        <div class="grid2">
          <label>Nome <input id="register-name" type="text" placeholder="Administrador" /></label>
          <label>Email <input id="register-email" type="email" placeholder="admin@agro.local" /></label>
          <label>Senha <input id="register-password" type="password" placeholder="mínimo 6 caracteres" /></label>
          <label>Perfil
            <select id="register-role">
              <option value="OPERATOR">OPERATOR</option>
              <option value="MANAGER">MANAGER</option>
              <option value="ADMIN">ADMIN</option>
            </select>
          </label>
        </div>
        <div class="actions"><button id="btn-register">Cadastrar usuário</button></div>
      </section>

      <section class="card">
        <h2>Fazendas</h2>
        <div class="grid2">
          <label>Nome <input id="farm-name" type="text" placeholder="Fazenda Santa Luzia" /></label>
          <label>Localização <input id="farm-location" type="text" placeholder="Sorriso/MT" /></label>
          <label>Área (ha) <input id="farm-area" type="number" step="0.01" /></label>
        </div>
        <div class="actions">
          <button id="btn-farm-save">Salvar fazenda</button>
          <button id="btn-farm-clear" class="secondary">Limpar</button>
          <button id="btn-farms-refresh" class="secondary">Atualizar lista</button>
        </div>
        <div id="farm-details" class="details"></div>
        <div id="farm-list"></div>
      </section>

      <section class="card">
        <h2>Talhões</h2>
        <div class="grid2">
          <label>Fazenda <select id="plot-farm"></select></label>
          <label>Nome <input id="plot-name" type="text" placeholder="Talhão A" /></label>
          <label>Área (ha) <input id="plot-area" type="number" step="0.01" /></label>
        </div>
        <div class="actions">
          <button id="btn-plot-save">Salvar talhão</button>
          <button id="btn-plot-clear" class="secondary">Limpar</button>
          <button id="btn-plots-refresh" class="secondary">Atualizar lista</button>
        </div>
        <div id="plot-details" class="details"></div>
        <div id="plot-list"></div>
      </section>

      <section class="card">
        <h2>Culturas</h2>
        <div class="grid2">
          <label>Nome <input id="crop-name" type="text" placeholder="Soja" /></label>
          <label>Nome científico <input id="crop-scientific" type="text" placeholder="Glycine max" /></label>
          <label>Ciclo (dias) <input id="crop-cycle" type="number" /></label>
        </div>
        <div class="actions">
          <button id="btn-crop-save">Salvar cultura</button>
          <button id="btn-crop-clear" class="secondary">Limpar</button>
          <button id="btn-crops-refresh" class="secondary">Atualizar lista</button>
        </div>
        <div id="crop-details" class="details"></div>
        <div id="crop-list"></div>
      </section>

      <section class="card">
        <h2>Atividades</h2>
        <div class="grid2">
          <label>Tipo
            <select id="activity-type">
              <option value="PLANTIO">PLANTIO</option>
              <option value="COLHEITA">COLHEITA</option>
              <option value="APLICACAO">APLICACAO</option>
            </select>
          </label>
          <label>Data <input id="activity-date" type="date" /></label>
          <label>Fazenda <select id="activity-farm"></select></label>
          <label>Talhão <select id="activity-plot"></select></label>
          <label>Cultura <select id="activity-crop"></select></label>
          <label>Quantidade <input id="activity-quantity" type="number" step="0.01" /></label>
          <label>Unidade <input id="activity-unit" type="text" placeholder="kg, L, ha" /></label>
          <label>Observações <textarea id="activity-notes" rows="2"></textarea></label>
        </div>
        <div class="actions">
          <button id="btn-activity-save">Salvar atividade</button>
          <button id="btn-activity-clear" class="secondary">Limpar</button>
          <button id="btn-activities-refresh" class="secondary">Atualizar lista</button>
        </div>
        <div id="activity-details" class="details"></div>
        <div id="activity-list"></div>
      </section>

      <section class="card">
        <h2>Relatórios simples</h2>
        <div class="actions">
          <button id="btn-report-summary">Resumo por tipo</button>
          <button id="btn-report-crop">Atividades por cultura</button>
        </div>
        <div id="report-details" class="details"></div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
